planner_client:
  ros__parameters:
    plan_solver_timeout: 15.0  
planner:
  ros__parameters:
    plan_solver_timeout: 15.0  
    plan_solver_plugins: ["POPF"]
    POPF:
      plugin: "plansys2/POPFPlanSolver"
    TFD:
      plugin: "plansys2/TFDPlanSolver"
    TAMER:
      plugin: "plansys2/TAMERPlanSolver"
monitor:
  ros__parameters:
    propose_timeout: 240.0
    summarize_mode: "limited"
    prompt_debug: false
    trunc_file: true  # truncate actions_hub log after each get_proposal; false = accumulate (advanced)
    monitor_plugins: ["LLAMA"]
    LLAMA:
      plugin: "plansys2/LLAMAMonitor"
      llm_debug: true
      pre_launch: true  # false = re-launch LLM per proposal (slower, frees RAM between proposals)
      model_yaml: "~/TFG/src/llm/llama_ros/llama_bringup/models/Qwen2.5-3B.yaml"
executor:
  ros__parameters:
    bt_builder_plugin: "SimpleBTBuilder"
    # bt_builder_plugin: "STNBTBuilder"